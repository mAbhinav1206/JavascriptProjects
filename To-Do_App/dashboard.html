<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Taskify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Puritan:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>
    <div class="h-screen bg-gradient-to-br from-violet-100 via-white to-violet-200">
        <div class="flex h-full bg-white shadow-2xl puritan-regular">

            <!-- Sidebar -->
            <aside class="w-72 border-r p-6 bg-gray-100 h-full overflow-y-auto">
                <div class="mb-10">
                    <h1 class="text-violet-600 flex items-center gap-2">
                        <i data-lucide="list-checks" class="w-10 h-10"></i>
                        <div>
                            <div class="text-2xl text-black puritan-bold">
                                <span>Taskify</span>
                            </div>

                            <p class="text-slate-400 text-sm">
                                Manage all Tasks
                            </p>
                        </div>
                    </h1>

                    <div class="grid grid-rows-4 gap-2 h-auto py-6">
                        <div
                            class="menu-item p-4 rounded-xl text-gray-500 hover:text-violet-600 bg-violet-100 text-violet-600 font-medium flex items-center cursor-pointer transition-all duration-300 ease-out justify-between">
                            <div class="flex items-center gap-3"><i data-lucide="clipboard-check"
                                    class="w-4 h-4"></i><span>All Tasks</span></div>
                            <span class="bg-slate-200 text-slate-600 text-sm px-2 py-1 rounded-lg">
                                0
                            </span>
                        </div>
                        <div
                            class="menu-item p-4 rounded-xl text-gray-500 hover:text-violet-600 cursor-pointer flex items-center transition-all duration-300 ease-in-out justify-between">
                            <div class="flex items-center gap-3"><i data-lucide="calendar"
                                    class="w-4 h-4"></i><span>Today</span></div>
                            <span class="bg-slate-200 text-slate-600 text-sm px-2 py-1 rounded-lg">
                                0
                            </span>
                        </div>
                        <div
                            class="menu-item p-4 rounded-xl text-gray-500 hover:text-violet-600 cursor-pointer flex items-center transition-all duration-300 ease-in-out justify-between">
                            <div class="flex items-center gap-3"><i data-lucide="clock-fading"
                                    class="w-4 h-4"></i><span>Upcoming</span></div>
                            <span class="bg-slate-200 text-slate-600 text-sm px-2 py-1 rounded-lg">
                                0
                            </span>
                        </div>
                        <div
                            class="menu-item p-4 rounded-xl text-gray-500 hover:text-violet-600 cursor-pointer flex items-center transition-all duration-300 ease-in-out justify-between">
                            <div class="flex items-center gap-3"><i data-lucide="circle-check-big"
                                    class="w-4 h-4"></i><span>Completed</span></div>
                            <span class="bg-slate-200 text-slate-600 text-sm px-2 py-1 rounded-lg">
                                0
                            </span>
                        </div>
                    </div>

                    <hr class="bg-gray-200">

                    <div class="mt-6">

                        <!-- Heading -->
                        <div class="flex items-center justify-between mb-4 px-3 mt-10">
                            <h3 class="font-semibold text-slate-700">
                                Categories
                            </h3>

                            <button
                                class="add-category text-slate-500 hover:text-violet-600 transition hover:bg-violet-100">
                                <i data-lucide="plus"></i>
                            </button>
                        </div>

                        <!-- Categories List -->
                        <div class="space-y-2">

                            <div
                                class="flex items-center justify-between p-3 rounded-xl hover:bg-slate-100 transition cursor-pointer">
                                <div class="flex items-center gap-3">
                                    <div class="w-3 h-3 rounded-full bg-blue-500"></div>
                                    <span class="text-slate-600">Work</span>
                                </div>

                                <span class="bg-slate-200 text-slate-600 text-sm px-2 py-1 rounded-lg">
                                    0
                                </span>
                            </div>

                            <div
                                class="flex items-center justify-between p-3 rounded-xl hover:bg-slate-100 transition cursor-pointer">
                                <div class="flex items-center gap-3">
                                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                                    <span class="text-slate-600">Personal</span>
                                </div>

                                <span class="bg-slate-200 text-slate-600 text-sm px-2 py-1 rounded-lg">
                                    0
                                </span>
                            </div>

                            <div
                                class="flex items-center justify-between p-3 rounded-xl hover:bg-slate-100 transition cursor-pointer">
                                <div class="flex items-center gap-3">
                                    <div class="w-3 h-3 rounded-full bg-violet-500"></div>
                                    <span class="text-slate-600">Study</span>
                                </div>

                                <span class="bg-slate-200 text-slate-600 text-sm px-2 py-1 rounded-lg">
                                    0
                                </span>
                            </div>

                            <div
                                class="flex items-center justify-between p-3 rounded-xl hover:bg-slate-100 transition cursor-pointer">
                                <div class="flex items-center gap-3">
                                    <div class="w-3 h-3 rounded-full bg-orange-500"></div>
                                    <span class="text-slate-600">Shopping</span>
                                </div>

                                <span class="bg-slate-200 text-slate-600 text-sm px-2 py-1 rounded-lg">
                                    0
                                </span>
                            </div>

                        </div>

                    </div>

                </div>
            </aside>

            <!-- main content -->
            <main class="flex-1 h-full overflow-y-auto overflow-x-hidden">
                <div class="sticky top-0 z-10 bg-white -mx-6 px-6 pt-6 pb-3">
                    <nav class="mt-0 pt-0 justify-between flex items-center px-3">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-800 mb-1">All Tasks</h2>
                        </div>

                        <div class="flex items-center gap-4">

                            <!-- Search -->
                            <div class="relative">

                                <i data-lucide="search"
                                    class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400">
                                </i>

                                <input id="searchInput" type="text" placeholder="Search tasks..."
                                    class="w-80 rounded-xl border border-slate-200 bg-white py-3 pl-11 pr-4 text-sm text-slate-700 shadow-sm outline-none transition-all duration-300 placeholder:text-slate-400 focus:border-violet-300 focus:ring-4 focus:ring-violet-100">

                            </div>

                            <!-- Add Task Button -->
                            <button id="addTaskBtn"
                                class="flex items-center gap-2 rounded-xl bg-violet-600 px-5 py-3 text-sm font-medium text-white shadow-sm transition-all duration-300 hover:bg-violet-700 hover:shadow-md active:scale-95">

                                <i data-lucide="plus" class="h-4 w-4"></i>

                                <span>Add Task</span>

                            </button>

                        </div>

                    </nav>

                    <!-- sort button -->
                    <div class="flex justify-end items-center gap-3 mb-4 px-3 mt-6 text-sm">

                        <span class="text-slate-500">
                            Sort by:
                        </span>

                        <div class="relative">

                            <select id="sortSelect"
                                class="appearance-none text-slate-500 py-2 pl-4 pr-7 border border-slate-200 rounded-lg bg-white outline-none focus:ring-2 focus:ring-violet-200">

                                <option>Recent</option>
                                <option>A-Z</option>
                                <option>Upcoming</option>

                            </select>

                            <i data-lucide="chevron-down"
                                class="absolute right-2 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none">
                            </i>

                        </div>

                    </div>
                </div>

                <div class="p-6">

                <!-- tasklist -->
                <div class="tasklist">
                    <div id="taskContainer" class="flex flex-col gap-3"></div>
                </div>

            </div>

            </main>

        </div>
    </div>

    <!-- Task Modal -->
    <div id="taskModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 mx-4">
            <div class="flex items-center justify-between mb-6">
                <h3 id="modalTitle" class="text-xl font-bold text-slate-800">Add Task</h3>
                <button id="closeModalBtn" class="text-slate-400 hover:text-slate-600 transition">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form id="taskForm" class="space-y-4">
                <input type="hidden" id="editTaskId">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Task Name</label>
                    <input type="text" id="taskNameInput" required
                        class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-700 outline-none transition-all focus:border-violet-300 focus:ring-4 focus:ring-violet-100"
                        placeholder="Enter task name">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Category</label>
                    <select id="taskCategoryInput"
                        class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-700 outline-none transition-all focus:border-violet-300 focus:ring-4 focus:ring-violet-100">
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Due Date</label>
                    <input type="date" id="taskDateInput"
                        class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-700 outline-none transition-all focus:border-violet-300 focus:ring-4 focus:ring-violet-100">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit"
                        class="flex-1 rounded-xl bg-violet-600 px-5 py-3 text-sm font-medium text-white shadow-sm transition-all duration-300 hover:bg-violet-700 hover:shadow-md active:scale-95">
                        Save Task
                    </button>
                    <button type="button" id="cancelModalBtn"
                        class="flex-1 rounded-xl border border-slate-200 px-5 py-3 text-sm font-medium text-slate-600 transition-all duration-300 hover:bg-slate-50 active:scale-95">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Category Modal -->
    <div id="categoryModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 mx-4">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-slate-800">Add Category</h3>
                <button id="closeCategoryModalBtn" class="text-slate-400 hover:text-slate-600 transition">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form id="categoryForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Category Name</label>
                    <input type="text" id="categoryNameInput" required
                        class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-700 outline-none transition-all focus:border-violet-300 focus:ring-4 focus:ring-violet-100"
                        placeholder="Enter category name">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Color</label>
                    <div class="flex gap-3" id="colorPicker">
                        <div class="w-8 h-8 rounded-full bg-blue-500 cursor-pointer ring-2 ring-offset-2 ring-blue-500" data-color="blue"></div>
                        <div class="w-8 h-8 rounded-full bg-green-500 cursor-pointer" data-color="green"></div>
                        <div class="w-8 h-8 rounded-full bg-violet-500 cursor-pointer" data-color="violet"></div>
                        <div class="w-8 h-8 rounded-full bg-orange-500 cursor-pointer" data-color="orange"></div>
                        <div class="w-8 h-8 rounded-full bg-red-500 cursor-pointer" data-color="red"></div>
                        <div class="w-8 h-8 rounded-full bg-pink-500 cursor-pointer" data-color="pink"></div>
                        <div class="w-8 h-8 rounded-full bg-teal-500 cursor-pointer" data-color="teal"></div>
                        <div class="w-8 h-8 rounded-full bg-yellow-500 cursor-pointer" data-color="yellow"></div>
                    </div>
                    <input type="hidden" id="categoryColorInput" value="blue">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit"
                        class="flex-1 rounded-xl bg-violet-600 px-5 py-3 text-sm font-medium text-white shadow-sm transition-all duration-300 hover:bg-violet-700 hover:shadow-md active:scale-95">
                        Add Category
                    </button>
                    <button type="button" id="cancelCategoryBtn"
                        class="flex-1 rounded-xl border border-slate-200 px-5 py-3 text-sm font-medium text-slate-600 transition-all duration-300 hover:bg-slate-50 active:scale-95">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script src="dashboard.js"></script>
</body>

</html>
